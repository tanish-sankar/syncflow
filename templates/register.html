<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #f0f0f0;
            color: #333333;
            font-family: 'Poppins', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            box-sizing: border-box;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        body.dark-mode {
            background-color: rgb(45, 44, 44);
            color: #ffffff;
        }

        .login-main-logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-main-logo img {
             display: inline-block;
             max-height: 110px;
             width: auto;
             border-radius: 8px;
             border: 2px solid #cccccc;
             box-sizing: border-box;
             transition: border-color 0.3s ease;
        }

        body.dark-mode .login-main-logo img {
             border-color: #ffffff;
        }


        .box {
            border: 2px solid #333333;
            padding: 30px;
            border-radius: 10px;
            width: 300px;
            max-width: 95%;
            height: auto;
            text-align: center;
            background-color: #ffffff;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            transition: background-color 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
        }

        body.dark-mode .box {
            border: 2px solid #ffffff;
            background-color: #2d2c2c;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
        }

        h2 {
            font-size: 1.8em;
            margin-top: 0;
            margin-bottom: 25px;
            color: #333333;
            transition: color 0.3s ease;
        }

        body.dark-mode h2 {
            color: #ffffff;
        }


        input[type="text"],
        input[type="password"] {
            width: 90%;
            padding: 15px 10px;
            margin: 10px 0;
            background-color: #e0e0e0;
            color: #333333;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 1em;
            font-family: 'Poppins', sans-serif;
            transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
        }

        body.dark-mode input[type="text"],
        body.dark-mode input[type="password"] {
            background-color: #000000;
            color: #ffffff;
            border: 1px solid #555;
        }

        input[type="text"]::placeholder,
         input[type="password"]::placeholder {
             color: #666;
         }

        body.dark-mode input[type="text"]::placeholder,
        body.dark-mode input[type="password"]::placeholder {
             color: #ccc;
        }


        input[type="submit"] {
            width: 100%;
            padding: 15px;
            margin-top: 20px;
            background-color: #000000;
            color: #ffffff;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s ease, color 0.3s ease;
            border: none;
            border-radius: 5px;
            font-size: 1em;
            font-family: 'Poppins', sans-serif;
        }

        input[type="submit"]:hover {
            background-color: rgb(220, 84, 84);
            color: #ffffff;
        }

        body.dark-mode input[type="submit"] {
            background-color: #ffffff;
            color: #000000;
        }

         body.dark-mode input[type="submit"]:hover {
            background-color: rgb(220, 84, 84);
            color: #ffffff;
        }


        a {
            color: #333333;
            text-decoration: none;
            font-size: 0.9em;
            margin-top: 15px;
            display: block;
            transition: color 0.3s ease;
        }

        body.dark-mode a {
            color: #ffffff;
        }

        a:hover {
            text-decoration: underline;
        }

         p {
            margin-top: 15px;
             font-size: 0.9em;
             transition: color 0.3s ease;
        }

        body.dark-mode p {
            color: #ffffff;
        }


        @media (max-width: 400px) {
             .login-main-logo img {
                  max-height: 60px;
             }
             .box {
                 width: 95%;
                 padding: 20px;
             }
             input[type="text"],
             input[type="password"] {
                  width: 100%;
             }
              h2 {
                 font-size: 1.5em;
             }
        }

    </style>
</head>
<body>

    <div class="login-main-logo">
         <img src="/static/Screenshot 2025-05-11 at 9.04.47 PM.png" alt="SyncFlow Logo">
         </div>

    <div class="box">
        <h2>Sign Up</h2>
        <form method="POST">
            <input type="text" name="username" placeholder="Username">
            <input type="password" name="password" placeholder="Password">
            <input type="submit" value="Register to SyncFlow">
        </form>
        <p>Already have an account? <a href="{{ url_for('login') }}">click on: Login</a></p>
    </div>
</body>
</html>
